<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>View All Branches (Extension)</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 15px;
			width: 220px;
			background-color: #f9f9f9;
		}

		h2 {
			font-size: 16px;
			margin-top: 0;
			margin-bottom: 12px;
			color: #333;
			text-align: center;
		}

		.settings-container {
			display: flex;
			flex-direction: column;
			gap: 10px; /* Creates space between the setting items */
		}

		.setting-item {
			display: flex;
			align-items: center; /* Vertically aligns the checkbox and text */
			font-size: 14px;
			cursor: pointer;
			padding: 8px;
			border-radius: 4px;
			background-color: #fff;
			border: 1px solid #ddd;
			transition: background-color 0.2s;
		}

			.setting-item:hover {
				background-color: #f0f0f0;
			}

			.setting-item input[type="checkbox"] {
				margin-right: 8px; /* Adds space between the checkbox and the label text */
			}

		footer {
			margin-top: 15px;
			text-align: center;
			font-size: 12px;
		}

			footer a {
				color: #0366d6;
				text-decoration: none;
			}

				footer a:hover {
					text-decoration: underline;
				}

		.footer-links {
			display: flex;
			justify-content: space-around;
		}
	</style>
</head>
<body>
	<h2>View All Branches</h2>
	<div class="settings-container">
		<label class="setting-item">
			<input type="checkbox" id="cbxGitHub" />
			<span>Enable href update</span>
		</label>
		<label class="setting-item">
			<input type="checkbox" id="cbxLogging" />
			<span>Enable logging</span>
		</label>
	</div>

	<footer>
		<div class="footer-links">
			<a href="https://jurakovic.github.io/view-all-branches/" target="_blank" rel="noopener noreferrer">Homepage</a>
			<a href="https://github.com/jurakovic/view-all-branches" target="_blank" rel="noopener noreferrer">GitHub</a>
		</div>
	</footer>

	<script src="popup.js"></script>
</body>
</html>
