<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View All Branches (Extension)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 15px;
            width: 220px;
            background-color: #2c2c2c;
            color: #f1f1f1;
        }

        h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 12px;
            color: #e0e0e0;
            text-align: center;
        }

        h3 {
            font-size: 14px;
            color: #cacaca;
            margin-top: 10px;
            margin-bottom: 5px;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
        }

        .settings-container {
            display: flex;
            flex-direction: column;
            gap: 10px; /* Creates space between the setting items */
        }

        .setting-item {
            display: flex;
            align-items: center; /* Vertically aligns the checkbox and text */
            font-size: 14px;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            background-color: #3a3a3a;
            border: 1px solid #555;
            transition: background-color 0.2s;
        }

            .setting-item:hover {
                background-color: #4a4a4a;
            }

            .setting-item input[type="checkbox"] {
                margin-right: 8px; /* Adds space between the checkbox and the label text */
            }

        footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
        }

            footer a {
                color: #58a6ff;
                text-decoration: none;
            }

                footer a:hover {
                    text-decoration: underline;
                }

        .footer-links {
            display: flex;
            justify-content: space-around;
        }

        .gitlab-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .domain-section {
            padding: 6px 8px;
            background-color: #333;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 12px;
        }

        .domain-label {
            color: #aaa;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .domain-input-row {
            display: flex;
            gap: 5px;
            margin-bottom: 2px;
        }

        #txtDomain,
        #txtAzureDevOpsDomain {
            flex: 1;
            background-color: #2c2c2c;
            border: 1px solid #555;
            border-radius: 3px;
            color: #f1f1f1;
            font-size: 12px;
            padding: 4px 6px;
            min-width: 0;
        }

            #txtDomain:focus,
            #txtAzureDevOpsDomain:focus {
                outline: none;
                border-color: #777;
            }

        #btnAddDomain,
        #btnAddAzureDevOpsDomain {
            background-color: #3a3a3a;
            border: 1px solid #555;
            border-radius: 3px;
            color: #f1f1f1;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            white-space: nowrap;
        }

            #btnAddDomain:hover,
            #btnAddAzureDevOpsDomain:hover {
                background-color: #4a4a4a;
            }

        .domain-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 0;
            border-top: 1px solid #444;
            color: #ccc;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 0 2px;
            line-height: 1;
            flex-shrink: 0;
        }

            .remove-btn:hover {
                color: #f1f1f1;
            }
    </style>
</head>
<body>
    <h2>View All Branches</h2>
    <div class="settings-container">
        <h3>Update links on:</h3>
        <label class="setting-item">
            <input type="checkbox" id="cbxGitHub" />
            <span>GitHub</span>
        </label>
        <div class="gitlab-group">
            <label class="setting-item">
                <input type="checkbox" id="cbxAzureDevOps" />
                <span>Azure DevOps</span>
            </label>
            <div class="domain-section">
                <div class="domain-label">Custom domains:</div>
                <div class="domain-input-row">
                    <input type="text" id="txtAzureDevOpsDomain" placeholder="devops.example.com" />
                    <button id="btnAddAzureDevOpsDomain">Add</button>
                </div>
                <div id="azureDevOpsDomainList"></div>
            </div>
        </div>
        <div class="gitlab-group">
            <label class="setting-item">
                <input type="checkbox" id="cbxGitLab" />
                <span>GitLab</span>
            </label>
            <div class="domain-section">
                <div class="domain-label">Custom domains:</div>
                <div class="domain-input-row">
                    <input type="text" id="txtDomain" placeholder="gitlab.example.com" />
                    <button id="btnAddDomain">Add</button>
                </div>
                <div id="domainList"></div>
            </div>
        </div>
        <h3>Misc.:</h3>
        <label class="setting-item">
            <input type="checkbox" id="cbxLogging" />
            <span>Show console logs</span>
        </label>
    </div>

    <footer>
        <div class="footer-links">
            <a href="https://jurakovic.github.io/view-all-branches/" target="_blank" rel="noopener noreferrer">Homepage</a>
            <a href="https://github.com/jurakovic/view-all-branches" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
